services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: poi-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: poi_manager
      POSTGRES_USER: poi_user
      POSTGRES_PASSWORD: poi_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: