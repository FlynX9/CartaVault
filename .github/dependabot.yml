version: 2
updates:
  # Frontend (npm / Vite)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Temporarily excluded versions (supported fields: dependency-name,
    # versions, update-types). Use a YAML comment for the tracking issue.
    # ignore:
    #   # Tracked in issue #N — remove when unblocked.
    #   - dependency-name: "example"
    #     versions: [">=2.0.0"]

  # Backend (pip)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"

  # Docker Compose images at repo root (postgis/postgis in docker-compose.yml)
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
