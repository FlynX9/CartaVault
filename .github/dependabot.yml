version: 2
updates:
  # Frontend (npm / Vite)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Temporarily excluded versions can be listed here with a short reason.
    # ignore:
    #   - dependency-name: "example"
    #     versions: [">=2.0.0"]
    #     reason: "Breaking API change; track in issue #N"

  # Backend (pip)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"

  # Docker base images (compose / Dockerfiles at repo root)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
