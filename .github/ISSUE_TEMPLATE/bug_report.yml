name: Rapport de bug
description: Signaler un comportement incorrect ou une régression
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce problème.
        Ne publiez jamais de mot de passe, clé API, jeton, fichier `.env` ou donnée personnelle.

  - type: input
    id: version
    attributes:
      label: Version ou commit
      description: Indiquez la version de CartaVault ou le hash du commit utilisé.
      placeholder: "Ex. 1e36d54 ou v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Système d’exploitation
      placeholder: "Ex. Windows 11, Ubuntu 24.04, Synology DSM 7"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Navigateur
      placeholder: "Ex. Chrome 150, Firefox 142"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Zone concernée
      options:
        - Frontend / interface
        - Backend / API
        - Base de données / migrations
        - Docker / déploiement
        - Import / export
        - Routage
        - Authentification / permissions
        - Documentation
        - Autre
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du problème
      description: Décrivez clairement le comportement observé.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Donnez une suite d’étapes aussi précise que possible.
      placeholder: |
        1. Ouvrir…
        2. Cliquer sur…
        3. Observer…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Résultat observé
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Journaux ou messages d’erreur
      description: |
        Collez uniquement les éléments utiles après avoir supprimé les secrets,
        jetons, adresses e-mail et données personnelles.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d’écran
      description: Ajoutez des captures si elles aident à comprendre le problème.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Vérifications
      options:
        - label: J’ai vérifié qu’aucune issue existante ne traite déjà ce problème.
          required: true
        - label: J’ai supprimé les informations sensibles des journaux et captures.
          required: true
