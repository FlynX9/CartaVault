<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Carte interactive des points d'intérêt de CartaVault"
    />
    <link rel="icon" type="image/png" href="/cartavault-icon.png" />
    <title>CartaVault</title>
    <script>
      (() => {
        try {
          const preference = localStorage.getItem('cartavault.theme')
          const dark = preference === 'dark'
            || ((preference === null || preference === 'system')
              && matchMedia('(prefers-color-scheme: dark)').matches)
          const theme = dark ? 'dark' : 'light'
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
          const density = localStorage.getItem('cartavault.display-density')
          document.documentElement.dataset.density = density === 'comfortable' || density === 'spacious'
            ? density
            : 'compact'
        } catch {
          document.documentElement.dataset.theme = 'light'
          document.documentElement.style.colorScheme = 'light'
          document.documentElement.dataset.density = 'compact'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
