<svg xmlns="http://www.w3.org/2000/svg" width="512" height="640" viewBox="0 0 512 640" role="img" aria-labelledby="title desc">
<title id="title">CartaVault icon</title>
<desc id="desc">Minimal CartaVault icon with a navy location pin, teal orbit ring and gold vault target motif.</desc>

<defs>
  <g id="cartavault-pin">
    <!-- pin silhouette -->
    <path d="M256 598
             C233 562 209 532 181 501
             C152 468 123 434 101 402
             C75 365 60 327 60 283
             C60 173 147 86 256 86
             C365 86 452 173 452 283
             C452 327 437 365 411 402
             C389 434 360 468 331 501
             C303 532 279 562 256 598 Z"
          fill="#0D1B2A"/>

    <!-- outer white ring -->
    <circle cx="256" cy="283" r="134" fill="none" stroke="#FFFFFF" stroke-width="26"/>

    <!-- teal orbit ring -->
    <circle cx="256" cy="283" r="98" fill="none" stroke="#0FA68A" stroke-width="22"/>

    <!-- diagonal dark separators on orbit ring -->
    <rect x="176" y="197" width="18" height="8" rx="4" fill="#64707A" transform="rotate(-48 185 201)"/>
    <rect x="318" y="197" width="18" height="8" rx="4" fill="#64707A" transform="rotate(48 327 201)"/>
    <rect x="318" y="360" width="18" height="8" rx="4" fill="#64707A" transform="rotate(-48 327 364)"/>
    <rect x="176" y="360" width="18" height="8" rx="4" fill="#64707A" transform="rotate(48 185 364)"/>

    <!-- orbit markers -->
    <circle cx="256" cy="173" r="16" fill="#E5C36A"/>
    <circle cx="366" cy="283" r="16" fill="#E5C36A"/>
    <circle cx="256" cy="393" r="16" fill="#E5C36A"/>
    <circle cx="146" cy="283" r="16" fill="#E5C36A"/>

    <!-- inner white ring -->
    <circle cx="256" cy="283" r="74" fill="none" stroke="#FFFFFF" stroke-width="28"/>

    <!-- center disc -->
    <circle cx="256" cy="283" r="73" fill="#0D1B2A"/>

    <!-- vault crosshair -->
    <line x1="256" y1="221" x2="256" y2="345" stroke="#E5C36A" stroke-width="12" stroke-linecap="round"/>
    <line x1="194" y1="283" x2="318" y2="283" stroke="#E5C36A" stroke-width="12" stroke-linecap="round"/>

    <!-- center seal -->
    <circle cx="256" cy="283" r="33" fill="#FFFFFF"/>
    <circle cx="256" cy="283" r="22" fill="#E5C36A"/>
  </g>
</defs>

<use href="#cartavault-pin"/>
</svg>